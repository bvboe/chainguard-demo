apiVersion: v1
kind: Service
metadata:
  name: banking-web-ui
spec:
  selector:
    app: banking-web-ui
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-web-ui
  template:
    metadata:
      labels:
        app: banking-web-ui
    spec:
      containers:
        - name: banking-web-ui
          image: banking-web-ui:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
          envFrom:
            - secretRef:
                name: banking-secrets
            - configMapRef:
                name: banking-config
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - >
                  node -e "const net=require('net');
                  const s=net.connect(5432,'banking-database');
                  s.on('connect',()=>{console.log('db ok'); process.exit(0);});
                  s.on('error',()=>process.exit(1));
                  setTimeout(()=>process.exit(1),1000);"
            failureThreshold: 60
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
