name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # Opt JavaScript actions into Node.js 24 ahead of GitHub forcing it on
  # 2026-06-02. Lets us drop the deprecation warnings without waiting
  # for upstream actions to ship Node 24-native versions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [banking-web-ui, banking-database, banking-worker]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            TAG="${TAG#v}"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify Chart.yaml and values.yaml match the tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          CHART_VERSION=$(grep '^version:' chart/Chart.yaml | awk '{print $2}')
          VALUES_TAG=$(grep -E '^[[:space:]]+tag:' chart/values.yaml | head -1 | awk '{print $2}')
          fail=0
          if [[ "$CHART_VERSION" != "$TAG" ]]; then
            echo "::error::Chart.yaml version ($CHART_VERSION) does not match tag ($TAG). Did you run scripts/release.sh?"
            fail=1
          fi
          if [[ "$VALUES_TAG" != "$TAG" ]]; then
            echo "::error::values.yaml image.tag ($VALUES_TAG) does not match tag ($TAG). Did you run scripts/release.sh?"
            fail=1
          fi
          [[ $fail -eq 0 ]] && echo "Versions verified: $TAG"
          exit $fail

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  publish-chart:
    runs-on: ubuntu-latest
    needs: publish-images
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push chart
        run: |
          helm package ./chart -d /tmp/chart
          helm push /tmp/chart/*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
